name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Create Package & App Directories
      run: |
        mkdir -p www
        if [ -f index.html ]; then cp index.html www/; fi
        echo '{"name": "lookschad", "version": "1.0.0"}' > package.json

    - name: Install Dependencies
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize or Update Capacitor
      run: |
        if [ ! -f capacitor.config.json ] && [ ! -f capacitor.config.ts ]; then
          npx cap init LooksChad com.lookschad.app --web-dir=www
        fi
        if [ ! -d "android" ]; then
          npx cap add android
        fi

    - name: Sync and Build APK
      run: |
        npx cap sync android
        cd android
        
        # Исправляем дубликаты классов Kotlin
        echo "android.useAndroidX=true" >> gradle.properties
        echo "kotlin.version=1.8.22" >> gradle.properties
        
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LooksChad-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
