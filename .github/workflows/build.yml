name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build and Sync
        run: |
          mkdir -p www
          if [ ! -f www/index.html ]; then echo "<html><body><h1>LooksChad</h1></body></html>" > www/index.html; fi
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init LooksChad com.lookschad.app --web-dir=www
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Force Fix Dependencies
        run: |
          cd android
          # Barcha eski Kotlin kutubxonalarini bloklash
          echo "
          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
              }
          }" >> app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LooksChad-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
