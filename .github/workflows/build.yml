name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Project
        run: |
          mkdir -p www
          if [ -f index.html ]; then cp index.html www/; fi
          echo '{"name": "lookschad", "version": "1.0.0"}' > package.json
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init LooksChad com.lookschad.app --web-dir=www
          rm -rf android
          npx cap add android
          npx cap sync android
          
          # ENG MUHIM QISM: Gradle'ga qat'iy buyruq
          cd android
          echo "configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
              }
          }" >> app/build.gradle
          
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
      - uses: actions/upload-artifact@v4
        with:
          name: LooksChad-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
